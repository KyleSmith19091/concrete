syntax = "proto3";

package slatestreams.v1;

service StreamService {
  rpc Append(AppendRequest) returns (AppendResponse);
  rpc Read(ReadRequest) returns (stream StreamRecord);
  rpc ListBasins(ListBasinsRequest) returns (ListBasinsResponse);
  rpc ListStreams(ListStreamsRequest) returns (ListStreamsResponse);
}

message AppendRequest {
  string basin_name = 1;
  string stream_name = 2;
  bytes data = 3;
}

message AppendResponse {
  uint64 next_seq_num = 1;
}

message ReadRequest {
  string basin_name = 1;
  string stream_name = 2;
  uint64 start_seq_num = 3;
}

message StreamRecord {
  uint64 seq_num = 1;
  bytes data = 2;
}

message ListBasinsRequest {}

message BasinView {
  string basin_name = 1;
}

message ListBasinsResponse {
  repeated BasinView basins = 1;
}

message ListStreamsRequest {
  string basin_name = 1;
}

message StreamView {
  string stream_name = 1;
}

message ListStreamsResponse {
  repeated StreamView streams = 1;
}
